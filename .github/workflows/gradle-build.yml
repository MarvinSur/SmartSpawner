name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
      - "master"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep 'version = "' build.gradle.kts | head -n 1 | awk -F'"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          COMMIT_SHA_SHORT=$(git rev-parse --short HEAD)
          echo "COMMIT_SHA_SHORT=$COMMIT_SHA_SHORT" >> $GITHUB_ENV
          echo "commit_sha_short=$COMMIT_SHA_SHORT" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (Commit: $COMMIT_SHA_SHORT)"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartSpawner-${{ steps.extract_version.outputs.version }}
          path: core/build/libs/SmartSpawner-${{ steps.extract_version.outputs.version }}.jar
          retention-days: 90
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ env.COMMIT_SHA_SHORT }}
          path: build/reports/tests/
          retention-days: 7

      - name: Automatic Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ startsWith(github.ref, 'refs/tags/') && '' || 'latest' }}
          prerelease: false
          title: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Development Build {0} ({1})', env.VERSION, env.COMMIT_SHA_SHORT) }}
          files: |
            core/build/libs/SmartSpawner-${{ env.VERSION }}.jar
            